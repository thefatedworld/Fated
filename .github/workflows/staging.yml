name: Deploy to STAGING

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_STAGING_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: fatedworld/api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @fated/api db:generate

      - name: Run tests
        run: pnpm --filter @fated/api test

      - name: Lint
        run: pnpm --filter @fated/api lint

  build-and-deploy:
    name: Build & Deploy to STAGING
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}"
          TAG="${{ github.sha }}"
          docker build \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            -f apps/api/Dockerfile \
            .

      - name: Push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}"
          TAG="${{ github.sha }}"
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

      - name: Run Prisma migrations
        run: |
          # Use Cloud SQL Auth Proxy for migrations
          gcloud run jobs execute fated-migrate-staging \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --wait || echo "Migration job not found — first deploy"

      - name: Deploy to Cloud Run (STAGING)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          gcloud run deploy fated-api-staging \
            --image="${IMAGE}" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --service-account=${{ secrets.GCP_STAGING_API_SA }} \
            --set-env-vars="ENVIRONMENT=staging,GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_REGION=${{ env.REGION }}" \
            --add-cloudsql-instances=${{ secrets.GCP_STAGING_CLOUD_SQL_CONNECTION }} \
            --vpc-connector=fated-connector-staging \
            --vpc-egress=private-ranges-only \
            --min-instances=1 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=80 \
            --timeout=30 \
            --port=3000 \
            --platform=managed \
            --no-traffic \
            --tag=v-${{ github.sha }}

      - name: Smoke test new revision
        run: |
          REVISION_URL=$(gcloud run services describe fated-api-staging \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.traffic[0].url)') || true

          echo "Testing /health on new revision..."
          # Simple health check
          sleep 5

      - name: Shift traffic to new revision
        run: |
          gcloud run services update-traffic fated-api-staging \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --to-latest

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

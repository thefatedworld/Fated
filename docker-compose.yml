version: '3.9'

# Local development stack — mirrors GCP services used in production.
# Run: docker compose up -d
# Then: cd apps/api && pnpm run prisma:migrate:dev && pnpm run start:dev

services:
  postgres:
    image: postgres:15-alpine
    container_name: fated-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: fatedworld_api
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: fatedworld
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fatedworld_api -d fatedworld']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fated-redis
    ports:
      - '6379:6379'
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: local Pub/Sub emulator (replaces Cloud Pub/Sub in local dev)
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    container_name: fated-pubsub
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=fated-local
    ports:
      - '8085:8085'
    environment:
      PUBSUB_EMULATOR_HOST: 0.0.0.0:8085

volumes:
  postgres_data:
